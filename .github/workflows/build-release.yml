name: Build Release APK (arm64 only)

on:
  workflow_dispatch:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK (arm64 only)
        run: |
          ./gradlew clean :app:assembleRelease \
            -PminifyEnabled=true \
            -PshrinkResources=true \
            -PsplitAbis=true \
            -PabiFilters=arm64-v8a

      - name: List outputs
        run: ls -R app/build/outputs/apk/release || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AndisheHoseini-Release-arm64
          path: app/build/outputs/apk/release/*arm64-v8a*.apk
          if-no-files-found: error
