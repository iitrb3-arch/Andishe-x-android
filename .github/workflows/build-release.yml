name: Android APK Builder (Fdroid Release - Lightweight)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          yes | $HOME/android-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "sdk.dir=$HOME/android-sdk" > local.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Configure homeserver URL
        run: |
          mkdir -p vector-app/src/main/assets
          echo '{ "defaultHomeserverUrl": "https://edu97.ir" }' > vector-app/src/main/assets/vector_config.json

      - name: Build Optimized Fdroid APK
        run: |
          ./gradlew clean :vector-app:assembleFdroidRelease \
            -PminifyEnabled=true -PshrinkResources=true \
            --no-daemon --stacktrace

      - name: Verify APK files
        run: ls -lh vector-app/build/outputs/apk/**/release/ || true

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Andishe-Fdroid-Release
          path: vector-app/build/outputs/apk/**/release/*.apk
